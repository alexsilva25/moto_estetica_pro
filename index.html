<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Detailing Motos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
</head>

<body class="bg-gradient-to-b from-black via-gray-900 to-black text-white scroll-smooth">

<header class="flex items-center justify-between px-6 py-4 border-b border-yellow-500">
  <div class="flex items-center gap-3">
    <img src="logo.png" class="w-12">
    <h1 class="text-xl font-bold text-yellow-400">World Detailing</h1>
  </div>
  <a href="#agendamento" class="bg-yellow-400 text-black px-4 py-2 rounded-lg font-bold">Agendar</a>
</header>

<section class="relative text-center py-40 px-6 bg-cover bg-center"
style="background-image: url('img/hero.jpg');">
<div class="absolute inset-0 bg-black/90"></div>

<div class="relative z-10">
  <img src="logo.png" class="mx-auto mb-6 w-36">
  <h1 class="text-6xl font-bold text-yellow-400">Estética Premium para Motos</h1>
  <p class="mt-4 text-gray-300">Brilho, proteção e acabamento de alto padrão</p>

  <div class="flex gap-4 justify-center mt-8 flex-wrap">
    <a href="#agendamento" class="bg-yellow-400 text-black px-8 py-4 rounded-full font-bold">Agendar</a>
    <a href="https://wa.me/5584998780004" class="border border-yellow-400 px-8 py-4 rounded-full">WhatsApp</a>
  </div>
</div>
</section>

<section class="py-24 px-6 text-center">
<h2 class="text-4xl font-bold mb-10 text-yellow-400">Resultados Reais</h2>
<div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
<img src="img/antes.jpg" class="rounded-xl">
<img src="img/depois.jpg" class="rounded-xl">
</div>
</section>

<section class="py-24 px-6 text-center">
<h2 class="text-4xl font-bold mb-10 text-yellow-400">Serviços</h2>
<div class="grid md:grid-cols-3 gap-8">
<img src="img/lavagem.jpg" class="rounded-xl">
<img src="img/polimento.jpg" class="rounded-xl">
<img src="img/vitrificacao.jpg" class="rounded-xl">
</div>
</section>

<section id="agendamento" class="py-20 px-6 text-center">
<h2 class="text-4xl font-bold mb-8">Agendar</h2>
<form onsubmit="enviar(event)" class="max-w-md mx-auto space-y-4">
<input id="nome" placeholder="Nome" required class="w-full p-4 rounded bg-gray-800">
<input id="data" type="date" required class="w-full p-4 rounded bg-gray-800">
<input id="hora" type="time" required class="w-full p-4 rounded bg-gray-800">
<button class="bg-yellow-400 text-black px-6 py-4 rounded-xl font-bold w-full">Confirmar</button>
</form>
</section>

<a href="https://wa.me/5584998780004" class="fixed bottom-6 right-6 bg-green-500 p-4 rounded-full">📲</a>

<script>
function enviar(e){
 e.preventDefault();
 let nome = document.getElementById('nome').value;
 let data = document.getElementById('data').value;
 let hora = document.getElementById('hora').value;
 let url = `https://wa.me/5584998780004?text=Agendamento%0A${nome}%20${data}%20${hora}`;
 window.open(url, '_blank');
}
</script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
