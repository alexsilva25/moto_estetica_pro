<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>World Detailing Motos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white text-center p-10">

<h1 class="text-4xl text-yellow-500 font-bold">World Detailing Motos</h1>
<p class="mt-2">Estética premium para sua moto</p>

<form id="form" class="max-w-md mx-auto mt-8 space-y-4">
<input id="nome" placeholder="Nome" class="w-full p-3 bg-gray-800" required>
<input id="telefone" placeholder="WhatsApp" class="w-full p-3 bg-gray-800" required>
<select id="servico" class="w-full p-3 bg-gray-800">
<option>Lavagem</option>
<option>Polimento</option>
<option>Vitrificação</option>
</select>
<input type="date" id="data" class="w-full p-3 bg-gray-800" required>
<input type="time" id="hora" class="w-full p-3 bg-gray-800" required>
<button class="bg-yellow-500 text-black w-full p-3 font-bold">Agendar</button>
</form>

<p id="msg" class="mt-4"></p>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const dados = {
    nome: nome.value,
    telefone: telefone.value,
    servico: servico.value,
    data: data.value,
    hora: hora.value
  };

  const res = await fetch('http://localhost:3000/agendar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados)
  });

  if (res.status === 400) {
    msg.innerText = 'Horário já ocupado';
    return;
  }

  msg.innerText = 'Agendado com sucesso!';
});
</script>

</body>
</html>
